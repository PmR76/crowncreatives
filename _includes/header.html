<header class="site-header">

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" aria-label="Toggle theme">
    <img 
      src="{{ '/assets/icons/sun-moon-magic.svg' | relative_url }}"
      alt=""
      class="theme-icon"
    >
  </button>

  <!-- HEADER CROWN (DAY + NIGHT) -->
  <div class="header-crown-wrapper">
    <div class="header-crown">

      <!-- DAY CROWN -->
      <img 
        src="{{ '/assets/img/day-crown.svg' | relative_url }}" 
        alt="Day Crown" 
        class="crown crown-day"
      >

      <!-- NIGHT CROWN -->
      <img 
        src="{{ '/assets/img/night-crown.svg' | relative_url }}" 
        alt="Night Crown" 
        class="crown crown-night"
      >

    </div>
  </div>

  <!-- TITLE + TAGLINE -->
  <div class="header-title-block">
    <h1 class="site-title">Crown Creatives</h1>
    <p class="site-tagline">Artistry • Resilience • Imagination</p>
  </div>

  <!-- NAVIGATION -->
  <nav class="site-nav">
    <ul>
      <li><a href="{{ '/' | relative_url }}">HOME</a></li>
      <li><a href="{{ '/about/' | relative_url }}">ABOUT</a></li>
      <li><a href="{{ '/gallery/' | relative_url }}">GALLERY</a></li>
      <li><a href="{{ '/projects/' | relative_url }}">PROJECTS</a></li>
      <li><a href="{{ '/videos/' | relative_url }}">VIDEOS</a></li>
      <li><a href="{{ '/podcasts/' | relative_url }}">PODCASTS</a></li>
      <li><a href="{{ '/blog/' | relative_url }}">BLOG</a></li>
      <li><a href="{{ '/contact/' | relative_url }}">CONTACT</a></li>
    </ul>
  </nav>

</header>
