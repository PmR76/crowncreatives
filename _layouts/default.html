---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>

  <!-- SITE CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style-v3.css?v=10' | relative_url }}">
</head>

<body data-theme="day">

  <!-- ========================================================= -->
  <!-- BACKGROUND MAGIC LAYERS (DAY + NIGHT REALMS)              -->
  <!-- ========================================================= -->
  <div class="realm-day"></div>
  <div class="realm-night"></div>

  <!-- ========================================================= -->
  <!-- HEADER                                                    -->
  <!-- ========================================================= -->
  {% include header.html %}

  <!-- ========================================================= -->
  <!-- PAGE CONTENT                                              -->
  <!-- ========================================================= -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- ========================================================= -->
  <!-- FOOTER                                                    -->
  <!-- ========================================================= -->
  {% include footer.html %}

  <!-- ========================================================= -->
  <!-- BACK TO TOP BUTTON                                        -->
  <!-- ========================================================= -->
  <div class="back-to-top">
    <img src="{{ '/assets/icons/up-arrow.svg' | relative_url }}" alt="Back to top">
  </div>

  <!-- ========================================================= -->
  <!-- THEME TOGGLE SCRIPT                                       -->
  <!-- ========================================================= -->
  <script src="{{ '/assets/js/theme-toggle.js?v=2' | relative_url }}"></script>

</body>
</html>
