---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>

  <!-- SITE CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style-v3.css?v=11' | relative_url }}">
</head>

<body class="{{ page.body_class }}" data-theme="day">

  <!-- ========================================================= -->
  <!-- BACKGROUND MAGIC LAYERS                                   -->
  <!-- ========================================================= -->
  <div class="realm-day"></div>
  <div class="realm-night"></div>

  <!-- ========================================================= -->
  <!-- HEADER                                                    -->
  <!-- ========================================================= -->
  {% include header.html %}

  <!-- ========================================================= -->
  <!-- TICKER                                                    -->
  <!-- ========================================================= -->
  <div class="ticker">
    <div class="ticker-track">
      <span class="ticker-item">Welcome to Crown Creatives</span>
      <span class="ticker-item">Magical design for magical brands</span>
      <span class="ticker-item">Explore the gallery</span>
    </div>
  </div>

  <!-- ========================================================= -->
  <!-- PAGE CONTENT                                              -->
  <!-- ========================================================= -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- ========================================================= -->
  <!-- FOOTER                                                    -->
  <!-- ========================================================= -->
  {% include footer.html %}

  <!-- ========================================================= -->
  <!-- BACK TO TOP BUTTON                                        -->
  <!-- ========================================================= -->
  <div class="back-to-top">
    <img src="{{ '/assets/icons/up-arrow-magic.svg' | relative_url }}" alt="Back to top">
  </div>

  <!-- ========================================================= -->
  <!-- UNIFIED JS ENGINE                                         -->
  <!-- ========================================================= -->
  <script src="/assets/js/site-magic.js"></script>

</body>
</html>
