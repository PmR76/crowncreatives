<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Crown Creatives</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>

<body class="{{ page.body_class }}">

  <!-- ========================= -->
  <!-- HEADER -->
  <!-- ========================= -->
  <header class="site-header">

    <!-- MAGICAL VIEW COUNTER (TOP LEFT) -->
    <div id="view-counter" class="view-counter">
      <span class="count-number">...</span>
    </div>

  <!-- THEME TOGGLE (TOP RIGHT) -->
<div class="theme-toggle">
  <img 
    src="{{ '/assets/icons/sun-moon-magic.svg' | relative_url }}"
    alt="Toggle theme" 
    class="theme-icon"
  >
</div>

    <!-- HEADER CROWN -->
    <div class="header-crown-wrapper">
      <img 
        src="{{ '/assets/img/head-crown.svg' | relative_url }}" 
        alt="Crown Creatives Crown" 
        class="header-crown-img"
      >
    </div>

    <!-- TITLE + TAGLINE -->
    <div class="header-title-block">
      <h1 class="site-title">Crown Creatives</h1>
      <p class="site-tagline">Artistry • Resilience • Imagination</p>
    </div>

    <!-- NAVIGATION -->
    <nav class="site-nav">
      <ul>
        <li><a href="{{ '/' | relative_url }}">HOME</a></li>
        <li><a href="{{ '/about/' | relative_url }}">ABOUT</a></li>
        <li><a href="{{ '/gallery/' | relative_url }}">GALLERY</a></li>
        <li><a href="{{ '/projects/' | relative_url }}">PROJECTS</a></li>
        <li><a href="{{ '/videos/' | relative_url }}">VIDEOS</a></li>
        <li><a href="{{ '/podcasts/' | relative_url }}">PODCASTS</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">BLOG</a></li>
        <li><a href="{{ '/contact/' | relative_url }}">CONTACT</a></li>
      </ul>
    </nav>

  </header>

  <!-- ========================= -->
  <!-- MAIN CONTENT -->
  <!-- ========================= -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- ========================= -->
  <!-- FOOTER -->
  <!-- ========================= -->
  <footer class="site-footer">
    <p>&copy; {{ site.time | date: "%Y" }} Crown Creatives. All rights reserved.</p>
  </footer>

  <!-- ========================= -->
  <!-- JAVASCRIPT -->
  <!-- ========================= -->
  <script src="/assets/js/view-counter.js"></script> <!-- ⭐ STEP 2 ADDED -->
  <script src="/assets/js/theme-toggle.js"></script>
  <script src="/assets/js/magic.js"></script>
  <script src="/assets/js/gallery.js"></script>
  <script src="/assets/js/hero-gallery.js"></script>

</body>
</html>
