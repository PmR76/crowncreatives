---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>

  <!-- SITE CSS -->
 <link rel="stylesheet" href="{{ '/assets/css/style-v2.css' | relative_url }}">

</head>
<body data-theme="day">

  <!-- ========================================================= -->
  <!-- BACKGROUND MAGIC LAYERS (DAY + NIGHT REALMS)              -->
  <!-- ========================================================= -->

  <div class="realm-day"></div>
  <div class="realm-night"></div>

  <!-- ========================================================= -->
  <!-- HEADER                                                    -->
  <!-- ========================================================= -->
  {% include header.html %}

  <!-- ========================================================= -->
  <!-- PAGE CONTENT                                              -->
  <!-- ========================================================= -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- ========================================================= -->
  <!-- INSPIRATION TICKER                                        -->
  <!-- ========================================================= -->

  <div class="ticker-wrapper">
    <div class="ticker">
      <span>Imagination becomes reality</span>
      <span>Creativity is courage in motion</span>
      <span>Every idea is a doorway</span>
      <span>Magic begins with belief</span>
    </div>
  </div>

  <!-- ========================================================= -->
  <!-- FOOTER                                                    -->
  <!-- ========================================================= -->
  {% include footer.html %}

  <!-- ========================================================= -->
  <!-- THEME TOGGLE SCRIPT                                       -->
  <!-- ========================================================= -->
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>

</body>
</html>
